<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="DM Sans, Arial, sans-serif">
  <rect width="800" height="460" fill="#ffffff"/>
  <text x="40" y="46" font-size="24" font-weight="700" fill="#1a2e22">The Cost of Microgreens: Store-Bought vs Grown at Home</text>
  <text x="40" y="72" font-size="14" fill="#5b6b62">Approximate cost per pound (USD)</text>

  <g font-size="12" fill="#9aa8a0">
    <line x1="220" y1="400" x2="760" y2="400" stroke="#d8e0db" stroke-width="2"/>
    <line x1="220" y1="320" x2="760" y2="320" stroke="#eef2f0"/><text x="200" y="324" text-anchor="end">$15</text>
    <line x1="220" y1="240" x2="760" y2="240" stroke="#eef2f0"/><text x="200" y="244" text-anchor="end">$30</text>
    <line x1="220" y1="160" x2="760" y2="160" stroke="#eef2f0"/><text x="200" y="164" text-anchor="end">$45</text>
    <line x1="220" y1="100" x2="760" y2="100" stroke="#eef2f0"/><text x="200" y="104" text-anchor="end">$55</text>
    <text x="200" y="404" text-anchor="end">$0</text>
  </g>

  <!-- Store-bought: $30-50/lb range band (y for 30=240, 50=133) -->
  <defs>
    <linearGradient id="red" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e8a39a"/><stop offset="1" stop-color="#cf6b5c"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7bbf9a"/><stop offset="1" stop-color="#2F9160"/>
    </linearGradient>
  </defs>
  <rect x="300" y="133" width="120" height="267" rx="6" fill="url(#red)"/>
  <text x="360" y="120" font-size="17" font-weight="700" fill="#b5503f" text-anchor="middle">$30–50</text>
  <text x="360" y="424" font-size="14" font-weight="600" fill="#3a4a42" text-anchor="middle">Store-bought</text>
  <text x="360" y="442" font-size="11" fill="#9aa8a0" text-anchor="middle">($4–6 per 2 oz clamshell)</text>

  <!-- Grown at home: $5-10/lb (y for 10=347, 5=373) -->
  <rect x="560" y="347" width="120" height="53" rx="6" fill="url(#grn)"/>
  <text x="620" y="334" font-size="17" font-weight="700" fill="#2F9160" text-anchor="middle">$5–10</text>
  <text x="620" y="424" font-size="14" font-weight="600" fill="#3a4a42" text-anchor="middle">Grown at home</text>
  <text x="620" y="442" font-size="11" fill="#9aa8a0" text-anchor="middle">(pre-seeded tray, harvested fresh)</text>

  <text x="40" y="455" font-size="11" fill="#9aa8a0">Illustrative estimates based on typical US retail pricing.</text>
</svg>
