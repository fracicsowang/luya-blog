<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="DM Sans, Arial, sans-serif">
  <rect width="800" height="460" fill="#ffffff"/>
  <text x="40" y="46" font-size="24" font-weight="700" fill="#1a2e22">How Nutrient-Dense Are Microgreens?</text>
  <text x="40" y="72" font-size="14" fill="#5b6b62">Relative nutrient density vs mature greens (× baseline)</text>

  <g font-size="12" fill="#9aa8a0">
    <line x1="220" y1="400" x2="760" y2="400" stroke="#d8e0db" stroke-width="2"/>
    <line x1="220" y1="320" x2="760" y2="320" stroke="#eef2f0"/><text x="200" y="324" text-anchor="end">1×</text>
    <line x1="220" y1="240" x2="760" y2="240" stroke="#eef2f0"/><text x="200" y="244" text-anchor="end">2×</text>
    <line x1="220" y1="160" x2="760" y2="160" stroke="#eef2f0"/><text x="200" y="164" text-anchor="end">3×</text>
    <line x1="220" y1="120" x2="760" y2="120" stroke="#eef2f0"/><text x="200" y="124" text-anchor="end">3.5×</text>
    <text x="200" y="404" text-anchor="end">0</text>
  </g>

  <defs>
    <linearGradient id="g1" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#b9c4be"/><stop offset="1" stop-color="#8a9890"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#7bbf9a"/><stop offset="1" stop-color="#3aa372"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#6fbf95"/><stop offset="1" stop-color="#2F9160"/></linearGradient>
  </defs>

  <!-- Mature greens 1x (y=320) -->
  <rect x="270" y="320" width="110" height="80" rx="6" fill="url(#g1)"/>
  <text x="325" y="308" font-size="16" font-weight="700" fill="#5b6b62" text-anchor="middle">1×</text>
  <text x="325" y="424" font-size="13" font-weight="600" fill="#3a4a42" text-anchor="middle">Mature greens</text>

  <!-- Microgreens avg ~2.5x (y=200) -->
  <rect x="425" y="200" width="110" height="200" rx="6" fill="url(#g2)"/>
  <text x="480" y="188" font-size="16" font-weight="700" fill="#3aa372" text-anchor="middle">~2.5×</text>
  <text x="480" y="424" font-size="13" font-weight="600" fill="#3a4a42" text-anchor="middle">Microgreens (avg)</text>

  <!-- Radish microgreens ~3.5x (y=120) -->
  <rect x="580" y="120" width="110" height="280" rx="6" fill="url(#g3)"/>
  <text x="635" y="108" font-size="16" font-weight="700" fill="#2F9160" text-anchor="middle">~3.5×</text>
  <text x="635" y="424" font-size="13" font-weight="600" fill="#3a4a42" text-anchor="middle">Radish microgreens</text>

  <text x="40" y="455" font-size="11" fill="#9aa8a0">Range 2–3.5× more nutrient-dense than mature counterparts. Source: peer-reviewed microgreen nutrition reviews (MDPI Plants, 2025).</text>
</svg>
