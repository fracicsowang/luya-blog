<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="DM Sans, Arial, sans-serif">
  <rect width="800" height="460" fill="#ffffff"/>
  <text x="40" y="46" font-size="24" font-weight="700" fill="#1a2e22">Sulforaphane: Broccoli Microgreens vs Mature Broccoli</text>
  <text x="40" y="72" font-size="14" fill="#5b6b62">Relative sulforaphane content (× compared with mature broccoli)</text>

  <!-- plot area -->
  <!-- baseline -->
  <line x1="220" y1="400" x2="760" y2="400" stroke="#d8e0db" stroke-width="2"/>

  <!-- gridlines + labels (0,25,50,75,100) -->
  <g font-size="12" fill="#9aa8a0">
    <line x1="220" y1="400" x2="760" y2="400" stroke="#eef2f0"/>
    <line x1="220" y1="320" x2="760" y2="320" stroke="#eef2f0"/><text x="200" y="324" text-anchor="end">25×</text>
    <line x1="220" y1="240" x2="760" y2="240" stroke="#eef2f0"/><text x="200" y="244" text-anchor="end">50×</text>
    <line x1="220" y1="160" x2="760" y2="160" stroke="#eef2f0"/><text x="200" y="164" text-anchor="end">75×</text>
    <line x1="220" y1="80"  x2="760" y2="80"  stroke="#eef2f0"/><text x="200" y="84"  text-anchor="end">100×</text>
    <text x="200" y="404" text-anchor="end">1×</text>
  </g>

  <!-- Bar 1: mature broccoli (1x, a sliver) -->
  <rect x="300" y="397" width="120" height="3" rx="1.5" fill="#9aa8a0"/>
  <text x="360" y="424" font-size="14" font-weight="600" fill="#3a4a42" text-anchor="middle">Mature broccoli</text>
  <text x="360" y="388" font-size="13" fill="#5b6b62" text-anchor="middle">1×</text>

  <!-- Bar 2: broccoli microgreens (range 10x-100x) -->
  <defs>
    <linearGradient id="g" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7bbf9a"/>
      <stop offset="1" stop-color="#2F9160"/>
    </linearGradient>
  </defs>
  <!-- band from 10x (y=336) to 100x (y=80) -->
  <rect x="560" y="80" width="120" height="320" rx="6" fill="url(#g)"/>
  <!-- 10x reference dashed line -->
  <line x1="540" y1="336" x2="700" y2="336" stroke="#1a2e22" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="708" y="340" font-size="12" fill="#3a4a42">10× (min)</text>
  <text x="620" y="128" font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle">10–100×</text>
  <text x="620" y="152" font-size="12" font-weight="600" fill="#eaf5ef" text-anchor="middle">more sulforaphane</text>
  <text x="620" y="424" font-size="14" font-weight="600" fill="#3a4a42" text-anchor="middle">Broccoli microgreens</text>

  <text x="40" y="450" font-size="11" fill="#9aa8a0">Illustrative range. Source: Johns Hopkins research on sulforaphane in broccoli sprouts/microgreens.</text>
</svg>
